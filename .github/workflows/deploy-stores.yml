name: Automate Deploy to Web Stores

on:
  push:
    tags:
      - 'v*' # Trigger only when a version tag is pushed (e.g. v1.0.0)

jobs:
  publish:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 1. Package Chrome Extension
      - name: Build Chrome Package
        run: |
          mkdir chrome-temp
          cp background.js content.js content.css popup.html popup.css popup.js icon.png PRIVACY_POLICY.md chrome-temp/
          cp manifest-chrome.json chrome-temp/manifest.json
          cd chrome-temp
          zip -r ../roll20-emote-share-chrome.zip .
          cd ..
          rm -rf chrome-temp

      # 2. Package Firefox Extension
      - name: Build Firefox Package
        run: |
          mkdir firefox-temp
          cp background.js content.js content.css popup.html popup.css popup.js icon.png PRIVACY_POLICY.md firefox-temp/
          cp manifest-firefox.json firefox-temp/manifest.json
          cd firefox-temp
          zip -r ../roll20-emote-share-firefox.zip .
          cd ..
          rm -rf firefox-temp

      # 3. Publish to Chrome Web Store
      - name: Upload & Publish to Chrome Web Store
        env:
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          npx chrome-webstore-upload-cli --source roll20-emote-share-chrome.zip --extension-id ${{ secrets.CHROME_APP_ID }}

      # 4. Upload and Submit to Firefox AMO
      - name: Upload & Sign on Firefox AMO
        run: |
          npx web-ext sign --source-dir firefox-temp --api-key ${{ secrets.AMO_JWT_ISSUER }} --api-secret ${{ secrets.AMO_JWT_SECRET }} --channel listed
