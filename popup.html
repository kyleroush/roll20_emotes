<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roll20 Emote Share</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="popup-header">
      <div class="title">Roll20 Emotes</div>
      <div class="status-indicator" id="status-dot"></div>
    </div>
    
    <div class="metadata-section">
      <div class="meta-item">
        <span class="label">Campaign:</span>
        <span class="value" id="campaign-val">Detecting...</span>
      </div>
      <div class="meta-item">
        <span class="label">Speaker:</span>
        <span class="value" id="sender-val">Detecting...</span>
      </div>
    </div>

    <div class="grid-title">Select Reaction</div>
    <div class="emoji-grid" id="emoji-grid">
      <button class="emoji-btn">😂</button>
      <button class="emoji-btn">😊</button>
      <button class="emoji-btn">🔥</button>
      <button class="emoji-btn">🎉</button>
      <button class="emoji-btn">👍</button>
      <button class="emoji-btn">❤️</button>
      <button class="emoji-btn">😮</button>
      <button class="emoji-btn">😢</button>
      <button class="emoji-btn">🎲</button>
      <button class="emoji-btn">⚔️</button>
      <button class="emoji-btn">🛡️</button>
      <button class="emoji-btn">🧙‍♂️</button>
      <button class="emoji-btn">🐉</button>
      <button class="emoji-btn">💀</button>
      <button class="emoji-btn">💥</button>
      <button class="emoji-btn">👑</button>
      <button class="emoji-btn">🔮</button>
      <button class="emoji-btn">🗺️</button>
      <button class="emoji-btn">👏</button>
      <button class="emoji-btn">💯</button>
      <button class="emoji-btn">🚀</button>
      <button class="emoji-btn">🤣</button>
      <button class="emoji-btn">🤔</button>
      <button class="emoji-btn">☠️</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
